<DOCTYPE html>

    <html lang="pt-br">
        <head>

        <meta charset="UTF-8">
        <meta name="vieweport" content="width=devide-width, initial-scale=1.0">

        <title>Jogo da Cobrinha</title>

        <style>

        .container { 
            <ShaderGradient
  animate="on"
  axesHelper="off"
  brightness={0}
  cAzimuthAngle={180}
  cDistance={3}
  cPolarAngle={90}
  cameraZoom={4.8}
  color1="#ba9f38"
  color2="#1e3b29"
  color3="#d0783b"
  destination="onCanvas"
  embedMode="off"
  envPreset="lobby"
  format="gif"
  fov={45}
  frameRate={10}
  gizmoHelper="hide"
  grain="on"
  lightType="3d"
  pixelDensity={1}
  positionX={-1.4}
  positionY={0}
  positionZ={0}
  range="disabled"
  rangeEnd={40}
  rangeStart={0}
  reflection={0.1}
  rotationX={0}
  rotationY={10}
  rotationZ={50}
  shader="defaults"
  type="plane"
  uAmplitude={1}
  uDensity={1.3}
  uFrequency={5.5}
  uSpeed={0.4}
  uStrength={4}
  uTime={0}
  wireframe={false}
/>
        }

        .info { 

        font-size: 1em;

        }

        .pontuacao {

            font-weight:bold;
            color:rgb(0, 0, 0);
        }

        .recorde{
            font-weight:bold;
            color:rgb(0, 0, 0);
        }

        #canvas{
            border: 3px solid #333;
            border-radius: 10px;
            background-color:#FDE3CF;
            display: block;

            margin: 20px auto;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }

        .controles{
            margin-top: 20px;

        }

        button{
            font-size: 16px;
            cursor: pointer;
            background-color: #d6a332;

            padding: 12px 25px;
            color:#000000;
            border: 3px black;
            border-radius: 8px;
            margin: 5px;
            transition: all 0.3s ease;
        }

        .teclas{
            display:grid;
            grid-template-columns: repeat(3, 50px);
            gap: 5px;
            justify-content: center;
            margin: 15px auto;

        }

        .tecla{
            width: 50px;
            height: 50px;
            background-color: #000000;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .tecla.vazia {
            background-color: transparent;
            cursor: default;
        }

        .tecla:active {
            background-color:#b8860b;
        }

        </style>

    </head>
    <body>
        <div class="container">
            <h1> &#128013; Jogo da cobrinha</h1>
            
            <div class="info">

                <div class="pontuacao">
                    pontuação: 0 <span id="pontos"> (0) </span>
                </div>
                <div class="recorde">
                    Recorde: 0   <span id="recorde"> (0) </span>
                </div>
            </div>

            <canvas id="canvas" width="400" height="400"> 
        <!--E um elemento especial para desenho 2D ou 3D. Por so só,
         é apenas um retangulo vazio. o JAVASCRIPT vai usar o "contexto 2D"
          para desenhar a cobra, a comifa etc...-->


                

            </canvas>

            <div> 

            <button onclick="iniciarJogo()">Iniciar jogo</button>
            <button onclick="pausarJogo()" >Pausar / continuar</button>           


            </div>

            <div class="teclas">

                 <div class="tecla vazia"></div>
                 <div class="tecla">&#9650;             </div>
                 <div class="tecla vazia"></div>
                 <div class="tecla">&#9668;</div>
                 <div class="tecla">&#9660;</div>
                 <div class="tecla">&#9658;</div>

            </div>

            </div>     
        
            <script>

            function iniciarJogo(){
                console.log("Jogo começou!!!");
            }

            function pausarJogo(){
                console.log("pausa no jogo!!!")
            }
        </script>
    </body>
</html>
