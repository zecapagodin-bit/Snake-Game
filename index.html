<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogo da cobrinha</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #849B5C, #000000, #BFFFC7);

    animation: gradientMove 10s ease infinite;

}

    @keyframes gradientMove {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

.container {
    text-align: center;
    background-color: #F0F0F0;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0px 10px 30px #000000;
    width: fit-content;
    margin: 50px auto;
}

.info {
    font-size: 1em;
}

.pontuacao {
    font-weight: bold;
    color: #28A745;
}

.recorde {
    font-weight: bold;
    color: #A72839;
}

#canvas {
    border: 3px solid #000;
    border-radius: 10px;
    background-color: #fff;
    display: block;
    margin: 20px auto;
    box-shadow: 0px 5px 15px #00000022;
}

button {
    font-size: 16px;
    cursor: pointer;
    background-color: #00FF00;
    padding: 12px 25px;
    color: #000;
    border: none;
    border-radius: 8px;
    margin: 5px;
    transition: all 0.3s ease;
}

.teclas {
    display: grid;
    grid-template-columns: repeat(3, 50px);
    gap: 5px;
    justify-content: center;
    margin: 15px auto;
}

.tecla {
    width: 50px;
    height: 50px;
    background-color: #000;
    color: #fff;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.tecla.vazia {
    background-color: #F0F0F0;
    cursor: default;
}

.tecla:active {
    background-color: red;
}

.instrucoes {
    margin-top: 20px;
    padding: 15px;
    background-color: white;
    border-radius: 10px;
    font-size: 14px;
    color: #555;
}

@media (max-width: 600px){
    h1 {
        font-size: 1.8em;
    }
}

</style>
</head>

<body>

<div class="container">
    <h1>🐍 Jogo da Cobrinha</h1>

    <div class="info">
        <div class="pontuacao">
            Pontuação: <span id="pontos">0</span>
        </div>
        <div class="recorde">
            Recorde: <span id="recorde">0</span>
        </div>
    </div>

    <canvas id="canvas" width="400" height="400"></canvas>

    <div>
        <button onclick="init()">Iniciar Jogo</button>
        <button onclick="pauseGame()">Pausar / Continuar</button>
    </div>

    <div class="teclas">
					<div class="tecla vazia"></div>
					<div class="tecla" onclick="mudarDirecao('cima')">&#9650;</div>
					<div class="tecla vazia"></div>
					<div class="tecla" onclick="mudarDirecao('esquerda')">&#9668;</div>
					<div class="tecla" onclick="mudarDirecao('baixo')">&#9660;</div>
					<div class="tecla" onclick="mudarDirecao('direita')">&#9658;</div>
				</div>

    <div class="instrucoes">
        <h3>Como Jogar:</h3>
        <p>Use as teclas do teclado ou os botões acima para controlar a cobra</p>
        <p>Coma as maçãs 🍎 para crescer e ganhar pontos</p>
        <p>Não bata nas paredes nem no próprio corpo</p>
    </div>
</div>

<script>

function mudarDirecao(novaDirecao){
    console.log(novaDirecao)
}

function init() {
    console.log("Jogo começou");
}

function pauseGame() {
    console.log("Jogo pausou");
}
</script>

</body>
</html>
