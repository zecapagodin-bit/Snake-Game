<DOCTYPE html>

    <html lang="pt-br">
        <head>

        <meta charset="UTF-8">
        <meta name="vieweport" content="width=devide-width, initial-scale=1.0">

        <title>Jogo da Cobrinha</title>

        <style>

        .container { 
            text-align: center;
            background-color: rgb(#284574);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgb(#c2932a);
        }

        .info { 

        font-size: 1em;

        }

        .pontuacao {

            font-weight:bold;
            color:rgb(0, 0, 0);
        }

        .recorde{
            font-weight:bold;
            color:rgb(0, 0, 0);
        }

        #canvas{
            border: 3px solid #333;
            border-radius: 10px;
            background-color:#b8860b;
            display: block;

            margin: 20px auto;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }

        .controles{
            margin-top: 20px;

        }

        button{
            font-size: 16px;
            cursor: pointer;
            background-color: #d6a332;

            padding: 12px 25px;
            color:#b8860b;
            border: none;
            border-radius: 8px;
            margin: 5px;
            transition: all 0.3s ease;
        }

        </style>

    </head>
    <body>
        <div class="container">
            <h1> &#128013; Jogo da cobrinha</h1>
            
            <div class="info">

                <div class="pontuacao">
                    pontuação: 0 <span id="pontos"> (0) </span>
                </div>
                <div class="recorde">
                    Recorde: 0   <span id="recorde"> (0) </span>
                </div>
            </div>

            <canvas id="canvas" width="400" height="400"> 
        <!--E um elemento especial para desenho 2D ou 3D. Por so só,
         é apenas um retangulo vazio. o JAVASCRIPT vai usar o "contexto 2D"
          para desenhar a cobra, a comifa etc...-->


                

            </canvas>

            <div>

            <button>pausar / continuar</button>

</html>
