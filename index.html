<!DOCTYPE html>

<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <!--
             <meta charset> Define o conjunto de caracteres (enconding) 
             da página. UTF-8 garante que acentos e caracteres especiais
             apareçam corretamente.
        -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!--
        <meta viewport>:  esta tag é imortante para sites que devem funcionar
        em dispositivos móveis (celular). width-device -> garate que a
        largura da página vai ser adaptar à largura do dispositivo.
        initial-scale=1 -> não aplica zoom automático ao abrir a página. 
        Sem ela o celular vai tentar mostrar a página como se fosse um computador
        -->
        <title>Jogo da Cobrinha</title>

        <!--
        Estilos e CSS vão ficar abaixo desta linha - Próxima Aual
        -->

        <style>

            .container {
              text-align: center;  
              background-color: white;
              padding: 30px;
              border-radius: 20px;
              box-shadow: 0px 10px 30px black;
            }

            .info {
                font-size: 1em;
            }

            .pontuacao {
                font-weight: bold;
                color: #28a745;
            }

            .recorde {
                font-weight: bold;
                color: #a72839;  
            }

            #canvas{
                border: 3px solid #333;
                border-radius:  10px;
                background-color: #F0F0F0;
                display: block;

                margin: 20px auto;
                box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
            }

            .controles {
                margin-top: 20px;
            }

            button {
                
                font-size: 16px;
                cursor: pointer;
                background-color: #28A745;

                padding: 12px 25px;
                color: white;
                border: none;
                border-radius: 8px;
                margin: 5px;
                transition: all 0.3s ease;
            }

            .teclas{
                display: grid;
                grid-template-columns: repeat(3, 50px);
                gap: 5px;
                justify-content: center;
                margin: 15px auto;
            }

            .tecla{
                width: 50px;
                height: 50px;
                background-color: #667eea;
                color: #F0F0F0;
                border: none;
                cursor: pointer;
                border-radius: 45px;
                font-size: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
            }

            .tecla:active{
                background-color: #a72839;
            }

            .tecla.vazio{
                background-color: transparent;
                cursor: default;
            }

            .instrucoes {
                margin-top: 20px;
                padding: 15px;
                background-color: #e9ecef;
                border-radius: 10px;
                font-size: 14px;
                color: #555;
            }

            .instrucoes h3 {
                margin-bottom: 10px;
                color: #333;
            }

            /*   
            MEDIA QUERY - adaptação para celular
            É como definir renders diferentes para exibição em cinena (4K) vs 
            Celular na vertical
            */
            @media (max-width: 600px){
                h1 {
                    font-size: 1.8em;
                }
                .info {
                    font-size: 1em;
                }
            }

        </style>
    </head>
    <body>

        <div  class="container">
            <h1>&#128013;  Jogo da Cobrinha &#128517;</h1>

            <div class="info">

                <div class="pontuacao">
                    Pontuação: <span id="pontos"> </span>
                </div>

                <div class="recorde">
                    Recorde: <span id="recorde"> </span>
                </div>

            </div>
            <canvas id="canvas" width="400" height="400">
                <!--
                
                <canvas>: é um elemento especial para desenho 2D ou 3D. Por si só,
                é apenas um retângulo vazio. O JavaScript vai usar o "contexto 2D" 
                para desenhar a cobra, e comida, etc
                -->

            </canvas>
            <div  class="controles">
                
                <button onclick="alert('iniciarJogo');">Iniciar Jogo</button>
                <button onclick="pause();">pausar / continuar</button>

            </div>

            <div class="teclas">

                <div class="tecla vazio"></div>
                <div class="tecla" onclick="mudarDirecao('cima')" >&#9650;</div>
                <div class="tecla vazio"></div>
                <div class="tecla" onclick="mudarDirecao('esquerda')" >&#9668;</div>
                <div class="tecla" onclick="mudarDirecao('baixo')" >&#9660;</div>
                <div class="tecla" onclick="mudarDirecao('direita')" >&#9658;</div>

            </div>

            <div class="instrucoes">
                <h3>Como Jogar:</h3>
                <p>Use as setas de teclado ou os botões acima para controlar a cobra</p>
                <p>Coma as maçãs vermelhas &#127822; para crescer e ganhar pontos</p>
                <p>Não bata nas paredes nem no próprio corpo</p>
            </div>

        </div>

        <script>

            //=============================
            // CONFIGURAÇÕES DO JOGO
            //=============================
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            // tamanho de cada quadrado no jogo
            const tamanhoQuadrado = 20;
            // quantos quadrados cabem na largura e altura do espaço 2D
            const quantidadeQuadrados = canvas.width / tamanhoQuadrado;

            //============================
            // Variáveis do Jogo
            //============================
            let cobra;              // Array (vetor) que guarda as posições da cobra
            let direcao;            // Direção atual da cobra
            let proximaDirecao;     // Próxima direção (evita viradas impossíveis)
            let comida;             // Posição da comida
            let pontos;             // Pontuação atual
            let recorde;            // Melhor pontuação
            let jogoAtivo;          // Se o jogo está rodando
            let jogoPausado;        // Se o jogo está pausado
            let intervaloJogo;      // Controla a velocidade do jogo

            //==============================
            // Carregar recorde do Navegador
            //==============================
            recorde = localStorage.getItem('recordeCobrinha') || 0;
            document.getElementById('recorde').textContent = recorde;

            //==============================
            // Função para inicar o Jogo
            //==============================
            function iniciarJogo(){
                cobra = [
                    { x: 10, y: 10},
                    { x: 9,  y: 10},
                    { x: 8,  y: 10},
                ];

                direcao = 'direita';
                proximaDirecao = 'direita';
                pontos = 0;
                jogoAtivo = true;
                jogoPausado = false;

                document.getElementById ('pontos').textContent = pontos;
                
                gerarComida();

            }

            //==============================
            //Função para gerar comida
            //==============================

                 function gerarComida(){
                    let posicaovalida = false
                    while(!posicaovalida){
                        comida = {
                            x : Math.floor(Math.random() * quantidadeQuadrados),
                            y : Math.floor(Math.random() * quantidadeQuadrados)
                        }

                        //verificar se a comida não está em cima da cobra
                        posicaovalida = true;

                        for(let pedaco of cobra){

                            if(comida.x === pedaco.x && comida.y === pedaco.y){
                                posicaovalida = false;
                                break;
                            }
                        }
                     }
                  }

            function mudarDirecao(novaDirecao){
                console.log(novaDirecao)
            }
            
            function pausarJogo(){
                console.log('Pausa no Jogo!!')
            }

        </script>

    </body>
</html>
